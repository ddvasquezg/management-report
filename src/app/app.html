<app-loading-overlay [isLoading]="isLoading()" />
<app-error-toast [message]="errorMsg()" />

<app-header
  [filterIa]="filterIa()"
  (filterChange)="onFilterChange($event)"
/>

<main class="app-content">
  <app-upload
    [compact]="hasData()"
    (fileSelected)="onFileSelected($event)"
    (loadSample)="onLoadSample()"
  />
  @defer (when hasData()) {
    <app-dashboard />
  }
</main>
