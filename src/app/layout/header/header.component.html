<header class="topbar">
  <div class="brand">
    <img src="assets/sample-data/Icono.png" alt="PersonalSoft icon" class="brand-icon" />
    <div class="brand-stack">
      <span class="brand-name">PersonalSoft</span>
      <span class="brand-sub">Management Report</span>
    </div>
  </div>

  <div class="topbar-actions">
    <label class="toggle-wrap">
      <input type="checkbox" [checked]="filterIa()" (change)="onFilterChange($event)" />
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
      <span class="toggle-label">Solo Uso IA</span>
    </label>
    <button
      class="btn btn-icon"
      (click)="onThemeToggle()"
      [title]="theme.isDark() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
      [attr.aria-label]="theme.isDark() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
    >
      @if (theme.isDark()) {
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      } @else {
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>
  </div>
</header>
